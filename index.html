<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StellarX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fafbfc; color: #111; overflow-x: hidden;
        }
        .dots-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(0,0,0,0.06) 1px, transparent 1px);
            background-size: 24px 24px; z-index: 0; pointer-events: none;
        }
        .deco-ring {
            position: fixed; border-radius: 50%; z-index: 0; pointer-events: none;
        }
        .deco-ring-1 {
            width: 600px; height: 600px;
            border: 1px solid rgba(79, 70, 229, 0.06);
            top: -200px; right: -150px;
            animation: rotate 40s linear infinite;
        }
        .deco-ring-2 {
            width: 400px; height: 400px;
            border: 1px solid rgba(168, 85, 247, 0.04);
            bottom: -100px; left: -100px;
            animation: rotate 30s linear infinite reverse;
        }
        .deco-ring-3 {
            width: 200px; height: 200px;
            border: 1px solid rgba(79, 70, 229, 0.03);
            top: 50%; left: 20%;
            animation: rotate 25s linear infinite;
        }
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .container {
            position: relative; z-index: 1;
            max-width: 1100px; margin: 0 auto; padding: 40px 24px;
            min-height: 100vh; display: flex; flex-direction: column;
        }
        .nav { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; }
        .logo { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; color: #111; }
        .logo span { color: #4f46e5; }
        .nav-links { display: flex; list-style: none; gap: 4px; }
        .nav-links a {
            text-decoration: none; color: #6b7280; font-size: 14px; font-weight: 500;
            padding: 8px 20px; border-radius: 8px; transition: all 0.2s;
        }
        .nav-links a:hover { color: #111; background: rgba(0,0,0,0.03); }

        .hero {
            flex: 1; display: flex; flex-direction: column; justify-content: center;
            padding: 80px 0;
        }
        .hero h1 {
            font-size: clamp(44px, 7vw, 76px); font-weight: 700;
            line-height: 1.1; letter-spacing: -2px; margin-bottom: 20px;
        }
        .hero h1 .grad {
            background: linear-gradient(135deg, #4f46e5, #7c3aed, #a855f7);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero h1 .outline {
            -webkit-text-stroke: 1.5px #111; -webkit-text-fill-color: transparent;
        }
        .hero p {
            font-size: 17px; color: #6b7280; line-height: 1.7;
            max-width: 480px; margin-bottom: 36px;
        }
        .hero-btns { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 12px 28px; border-radius: 10px;
            font-size: 14px; font-weight: 600; text-decoration: none;
            transition: all 0.25s;
        }
        .btn-primary { background: #111; color: #fff; }
        .btn-primary:hover { background: #222; transform: translateY(-1px); }
        .btn-secondary {
            background: transparent; color: #6b7280; border: 1px solid #e5e7eb;
        }
        .btn-secondary:hover { border-color: #d1d5db; color: #111; transform: translateY(-1px); }

        .footer {
            padding: 20px 0; border-top: 1px solid rgba(0,0,0,0.04);
            display: flex; justify-content: space-between; align-items: center;
        }
        .footer a { color: #9ca3af; text-decoration: none; font-size: 13px; }
        .footer a:hover { color: #4f46e5; }
        .footer .sep { color: #e5e7eb; margin: 0 12px; }
        .status-dot { display: inline-block; width: 6px; height: 6px; background: #34d399; border-radius: 50%; margin-right: 6px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .status-text { color: #9ca3af; font-size: 12px; }

        @media (max-width: 600px) {
            .container { padding: 24px 20px; }
            .nav { flex-direction: column; gap: 12px; margin-bottom: 20px; }
            .hero { padding: 40px 0; }
            .footer { flex-direction: column; gap: 12px; }
        }
    </style>
</head>
<body>
    <div class="dots-bg"></div>
    <div class="deco-ring deco-ring-1"></div>
    <div class="deco-ring deco-ring-2"></div>
    <div class="deco-ring deco-ring-3"></div>

    <div class="container">
        <nav class="nav">
            <div class="logo">Stellar<span>X</span></div>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="about.html">关于</a></li>
                <li><a href="products.html">产品</a></li>
                <li><a href="blog.html">博客</a></li>
                <li><a href="contact.html">联系</a></li>
            </ul>
        </nav>

        <div class="hero">
            <h1>
                用 <span class="grad">技术</span><br>
                创造 <span class="outline">价值</span>
            </h1>
            <p>一个专注于技术探索与创意实践的个人空间。从域名搭建到前端开发，每一步都是成长。</p>
            <div class="hero-btns">
                <a href="about.html" class="btn btn-primary">了解更多 →</a>
                <a href="blog.html" class="btn btn-secondary">浏览博客</a>
            </div>
        </div>

        <div class="footer">
            <div>
                <span class="status-dot"></span>
                <span class="status-text">所有系统正常</span>
            </div>
            <div>
                <a href="index.html">首页</a><span class="sep">·</span>
                <a href="about.html">关于</a><span class="sep">·</span>
                <a href="products.html">产品</a><span class="sep">·</span>
                <a href="blog.html">博客</a><span class="sep">·</span>
                <a href="contact.html">联系</a>
            </div>
        </div>
    </div>
</body>
</html>
